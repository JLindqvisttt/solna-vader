<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dagens väder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    .location {
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-bottom: 8px;
    }

    /* City selector */
    .city-selector {
      position: relative;
      margin-bottom: 32px;
    }

    .city-selector select {
      appearance: none;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      color: white;
      font-size: 1.5rem;
      font-weight: 700;
      font-family: inherit;
      padding: 10px 44px 10px 20px;
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: background 0.2s;
    }

    .city-selector select:hover {
      background: rgba(255,255,255,0.15);
    }

    .city-selector select:focus {
      outline: none;
      border-color: rgba(255,255,255,0.45);
    }

    .city-selector select option {
      background: #16213e;
      color: white;
      font-size: 1rem;
    }

    .city-selector::after {
      content: '▾';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: rgba(255,255,255,0.5);
      font-size: 1rem;
    }

    .weather-icon {
      font-size: 5rem;
      line-height: 1;
      margin-bottom: 16px;
    }

    .temp {
      font-size: 5rem;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
    }

    .feels {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.5);
      margin-top: 8px;
    }

    .description {
      font-size: 1.25rem;
      font-weight: 500;
      margin: 20px 0 32px;
      text-transform: capitalize;
      color: rgba(255,255,255,0.85);
    }

    .details {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-top: 8px;
    }

    .detail-box {
      background: rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 14px 10px;
    }

    .detail-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 6px;
    }

    .detail-value {
      font-size: 1.15rem;
      font-weight: 600;
    }

    .updated {
      margin-top: 28px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.3);
    }

    .error { color: #ff6b6b; font-size: 1rem; margin-top: 16px; }

    .loading { opacity: 0.5; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
  </style>
</head>
<body>
  <div class="card">
    <div class="location">Dagens väder</div>

    <div class="city-selector">
      <select id="city-select" onchange="onCityChange()">
        <option value="59.3604,18.0007">Solna, Stockholm</option>
        <option value="59.3293,18.0686">Stockholm</option>
        <option value="57.7089,11.9746">Göteborg</option>
        <option value="55.6050,13.0038">Malmö</option>
        <option value="59.8586,17.6389">Uppsala</option>
        <option value="58.4108,15.6214">Linköping</option>
        <option value="56.1612,15.5869">Karlskrona</option>
        <option value="63.8258,20.2630">Umeå</option>
        <option value="65.5848,22.1547">Luleå</option>
        <option value="67.8558,20.2253">Kiruna</option>
        <option value="48.8566,2.3522">Paris, Frankrike</option>
        <option value="51.5074,-0.1278">London, UK</option>
        <option value="40.7128,-74.0060">New York, USA</option>
        <option value="35.6762,139.6503">Tokyo, Japan</option>
        <option value="25.2048,55.2708">Dubai, UAE</option>
      </select>
    </div>

    <div id="weather-icon" class="weather-icon loading">⏳</div>
    <div id="temp" class="temp loading">--°</div>
    <div id="feels" class="feels"></div>
    <div id="description" class="description loading">Hämtar väder...</div>

    <div class="details">
      <div class="detail-box">
        <div class="detail-label">💧 Luftfukt.</div>
        <div class="detail-value" id="humidity">--%</div>
      </div>
      <div class="detail-box">
        <div class="detail-label">💨 Vind</div>
        <div class="detail-value" id="wind">-- m/s</div>
      </div>
      <div class="detail-box">
        <div class="detail-label">☁️ Moln</div>
        <div class="detail-value" id="clouds">--%</div>
      </div>
    </div>

    <div class="updated" id="updated"></div>
    <div class="error" id="error"></div>
  </div>

  <script>
    const WMO_CODES = {
      0:  ['☀️',  'Klart'],
      1:  ['🌤️', 'Mestadels klart'],
      2:  ['⛅',  'Halvklart'],
      3:  ['☁️',  'Mulet'],
      45: ['🌫️', 'Dimma'],
      48: ['🌫️', 'Issdimma'],
      51: ['🌦️', 'Lätt duggregn'],
      53: ['🌦️', 'Duggregn'],
      55: ['🌧️', 'Kraftigt duggregn'],
      61: ['🌧️', 'Lätt regn'],
      63: ['🌧️', 'Regn'],
      65: ['🌧️', 'Kraftigt regn'],
      71: ['🌨️', 'Lätt snö'],
      73: ['🌨️', 'Snö'],
      75: ['❄️',  'Kraftigt snöfall'],
      80: ['🌦️', 'Lätta regnskurar'],
      81: ['🌧️', 'Regnskurar'],
      82: ['⛈️',  'Kraftiga skurar'],
      95: ['⛈️',  'Åska'],
      99: ['⛈️',  'Åska med hagel'],
    };

    function setLoading() {
      ['weather-icon','temp','description'].forEach(id => {
        document.getElementById(id).classList.add('loading');
      });
      document.getElementById('weather-icon').textContent = '⏳';
      document.getElementById('temp').textContent = '--°';
      document.getElementById('description').textContent = 'Hämtar väder...';
      document.getElementById('feels').textContent = '';
      document.getElementById('humidity').textContent = '--%';
      document.getElementById('wind').textContent = '-- m/s';
      document.getElementById('clouds').textContent = '--%';
      document.getElementById('error').textContent = '';
    }

    async function fetchWeather() {
      const select = document.getElementById('city-select');
      const [lat, lon] = select.value.split(',');

      setLoading();

      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
          + `&current=temperature_2m,apparent_temperature,relative_humidity_2m,`
          + `wind_speed_10m,cloud_cover,weather_code`
          + `&wind_speed_unit=ms&timezone=auto`;

        const res = await fetch(url);
        if (!res.ok) throw new Error('API-fel');
        const data = await res.json();
        const c = data.current;

        const [icon, desc] = WMO_CODES[c.weather_code] ?? ['🌡️', 'Okänt'];

        document.getElementById('weather-icon').textContent = icon;
        document.getElementById('weather-icon').classList.remove('loading');

        document.getElementById('temp').textContent = `${Math.round(c.temperature_2m)}°`;
        document.getElementById('temp').classList.remove('loading');

        document.getElementById('feels').textContent =
          `Känns som ${Math.round(c.apparent_temperature)}°C`;

        document.getElementById('description').textContent = desc;
        document.getElementById('description').classList.remove('loading');

        document.getElementById('humidity').textContent = `${c.relative_humidity_2m}%`;
        document.getElementById('wind').textContent = `${c.wind_speed_10m} m/s`;
        document.getElementById('clouds').textContent = `${c.cloud_cover}%`;

        const now = new Date();
        document.getElementById('updated').textContent =
          `Uppdaterad ${now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'})}`;

      } catch (e) {
        document.getElementById('error').textContent = 'Kunde inte hämta väderdata.';
        document.getElementById('weather-icon').textContent = '❌';
        document.getElementById('weather-icon').classList.remove('loading');
      }
    }

    function onCityChange() {
      fetchWeather();
    }

    fetchWeather();
    setInterval(fetchWeather, 10 * 60 * 1000);
  </script>
</body>
</html>
